<!DOCTYPE html>
<html>

<head>
    <title>Result</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="header" id="title"></div>

    <div class="result-box">
        <h1>🎉 Exam Completed!</h1>
        <p id="score"></p>
        <p id="percent"></p>

        <button onclick="review()">Review Exam</button>
    </div>

    <script src="data.js"></script>
    <script>
        let exam = exams[localStorage.getItem("examType")];
        let ans = JSON.parse(localStorage.getItem("answers"));

        let correct = 0;
        exam.forEach((q, i) => {
            if (q.answer === ans[i]) correct++;
        });

        document.getElementById("score").innerText =
            `Your Score: ${correct} / ${exam.length}`;

        document.getElementById("percent").innerText =
            `Percentage: ${correct * 10}%`;

        function review() {
            window.location.href = "review.html";
        }

        const examType = localStorage.getItem("examType");

        // convert key -> title đẹp
        function formatTitle(type) {
            return type
                .replace("_", " ")
                .replace(/\b\w/g, c => c.toUpperCase()) + " Exam";
        }

        document.getElementById("title").innerText = formatTitle(examType);
    </script>

</body>

</html>

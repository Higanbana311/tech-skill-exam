<!DOCTYPE html>
<html>

<head>
    <title>Exam</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="header">Java Basic Exam</div>

    <div class="exam-box">

        <div class="top">
            <span id="progressText"></span>
            <span id="percent"></span>
        </div>

        <div class="progress-bar">
            <div id="progressBar"></div>
        </div>

        <h2 id="question"></h2>

        <div id="answers"></div>

        <div class="nav">
            <button class="prev" onclick="prev()">Previous</button>
            <button class="next" onclick="next()">Next</button>
        </div>

    </div>

    <script src="data.js"></script>
    <script>
        let exam = exams[localStorage.getItem("examType")];
        let current = 0;
        let answers = new Array(exam.length).fill(null);

        function load() {
            let q = exam[current];

            document.getElementById("progressText").innerText =
                `Question ${current + 1} / ${exam.length}`;

            let percent = Math.round((current + 1) / exam.length * 100);
            document.getElementById("percent").innerText = percent + "%";
            document.getElementById("progressBar").style.width = percent + "%";

            document.getElementById("question").innerText = q.question;

            let html = "";
            q.options.forEach((opt, i) => {
                html += `
            <div class="option ${answers[current] == i ? 'selected' : ''}"
                 onclick="choose(${i})">
                ${opt}
            </div>
        `;
            });

            document.getElementById("answers").innerHTML = html;
        }

        function choose(i) {
            answers[current] = i;
            load();
        }

        function next() {
            if (current < exam.length - 1) {
                current++;
                load();
            } else {
                localStorage.setItem("answers", JSON.stringify(answers));
                window.location.href = "result.html";
            }
        }

        function prev() {
            if (current > 0) {
                current--;
                load();
            }
        }

        load();
    </script>

</body>

</html>
